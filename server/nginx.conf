upstream app_backend {
    server app:3001;
}

# HTTP → HTTPS 301 重定向
server {
    listen 80;
    server_name 47.251.107.41 www.xquareliu.com xquareliu.com;
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl;
    server_name www.xquareliu.com xquareliu.com;

    ssl_certificate     /etc/nginx/ssl/xquareliu.com.pem;
    ssl_certificate_key /etc/nginx/ssl/xquareliu.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # 允许摄像头和麦克风访问（扫码功能需要）
    add_header Permissions-Policy "camera=*, microphone=*" always;

    # 允许上传最大 500MB 的文件（匹配 multer 上限）
    client_max_body_size 500M;

    # API reverse proxy
    location /api {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /assets/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /vite.svg {
        root /usr/share/nginx/html;
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
    }

    location = /index.html {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Static front-end files
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
