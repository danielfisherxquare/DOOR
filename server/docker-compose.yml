services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: door
      POSTGRES_USER: door
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-door_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U door" ]
      interval: 5s
      retries: 5

  app:
    build: .
    command: [ "node", "src/index.js" ]
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://door:${POSTGRES_PASSWORD:-door_dev}@postgres:5432/door
      JWT_SECRET: ${JWT_SECRET:-dev_secret}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: [ "node", "src/worker.js" ]
    environment:
      DATABASE_URL: postgres://door:${POSTGRES_PASSWORD:-door_dev}@postgres:5432/door
      JWT_SECRET: ${JWT_SECRET:-dev_secret}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../dist:/usr/share/nginx/html:ro
    depends_on:
      - app

volumes:
  pgdata:
