services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: door
      POSTGRES_USER: door
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-door_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U door" ]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      retries: 5

  app:
    build: .
    command: [ "node", "src/index.js" ]
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://door:${POSTGRES_PASSWORD:-door_dev}@postgres:5432/door
      JWT_SECRET: ${JWT_SECRET:-dev_secret}
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # Optional runtime config (recommended in production)
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-false}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://www.xquareliu.com}
      BACKUP_DIR: ${BACKUP_DIR:-/backups}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-10}
      RESTORE_UPLOAD_DIR: ${RESTORE_UPLOAD_DIR:-/backups/uploads}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${HOST_BACKUP_DIR:-/var/backups/door}:${BACKUP_DIR:-/backups}

  worker:
    build: .
    command: [ "node", "src/worker.js" ]
    environment:
      DATABASE_URL: postgres://door:${POSTGRES_PASSWORD:-door_dev}@postgres:5432/door
      JWT_SECRET: ${JWT_SECRET:-dev_secret}
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-false}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://www.xquareliu.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../dist:/usr/share/nginx/html:ro
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app

volumes:
  pgdata:
