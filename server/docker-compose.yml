services:
  postgres:
    image: postgres:16-alpine
    container_name: door-postgres
    environment:
      POSTGRES_DB: door
      POSTGRES_USER: door
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-door_dev}
    volumes:
      # ⚠️ 绑定挂载到宿主机目录，docker compose down -v 不会删除
      - ${PGDATA_HOST_DIR:-./pgdata}:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U door" ]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: door-redis
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      retries: 5

  app:
    image: door-server-app:latest
    build: .
    container_name: door-app
    command: [ "node", "src/index.js" ]
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://door:${POSTGRES_PASSWORD:-door_dev}@postgres:5432/door
      JWT_SECRET: ${JWT_SECRET:-dev_secret}
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      # PII 加密密钥（key-guard 启动时验证一致性）
      PII_ACTIVE_KEY_VERSION: ${PII_ACTIVE_KEY_VERSION:-v1}
      PII_ENCRYPTION_KEY_V1: ${PII_ENCRYPTION_KEY_V1:-}
      PII_HMAC_KEY_V1: ${PII_HMAC_KEY_V1:-}
      # Optional runtime config (recommended in production)
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-false}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://www.xquareliu.com}
      BACKUP_DIR: ${BACKUP_DIR:-/backups}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-10}
      RESTORE_UPLOAD_DIR: ${RESTORE_UPLOAD_DIR:-/backups/uploads}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${HOST_BACKUP_DIR:-./backups}:${BACKUP_DIR:-/backups}
      # Required for .env backup to function correctly inside the container
      - ./.env:/app/.env:ro

  worker:
    image: door-server-app:latest
    container_name: door-worker
    command: [ "node", "src/worker.js" ]
    environment:
      DATABASE_URL: postgres://door:${POSTGRES_PASSWORD:-door_dev}@postgres:5432/door
      JWT_SECRET: ${JWT_SECRET:-dev_secret}
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DISABLE_REGISTRATION: ${DISABLE_REGISTRATION:-false}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://www.xquareliu.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 自动备份：每 6 小时调用现有备份脚本，与 Web 后台完全集成
  pg-backup:
    image: door-server-app:latest
    container_name: door-pg-backup
    environment:
      DATABASE_URL: postgres://door:${POSTGRES_PASSWORD:-door_dev}@postgres:5432/door
      BACKUP_DIR: ${BACKUP_DIR:-/backups}
      BACKUP_RETENTION_COUNT: ${BACKUP_RETENTION_COUNT:-20}
      DB_OPS_LOCK_DIR: /tmp/door-db-ops.lock
    volumes:
      - ${HOST_BACKUP_DIR:-./backups}:${BACKUP_DIR:-/backups}
      - ./.env:/app/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "[auto-backup] 自动备份服务已启动 (每6小时)"
        echo "[auto-backup] 备份目录: $${BACKUP_DIR}"
        echo "[auto-backup] 保留策略: 最近 $${BACKUP_RETENTION_COUNT} 份"
        while true; do
          echo "[auto-backup] 开始备份 ($$(date '+%Y-%m-%d %H:%M:%S'))"
          bash /app/scripts/run-postgres-backup.sh --trigger auto 2>&1 && \
            echo "[auto-backup] ✅ 备份成功" || \
            echo "[auto-backup] ❌ 备份失败"
          echo "[auto-backup] 下次备份: 6小时后"
          sleep 21600
        done
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: door-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ../dist:/usr/share/nginx/html:ro
      - /etc/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
